<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEEInventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        
        <header>
            <h1>EEEInventory</h1>
            <p>Real-time availability of electronic components</p>
        </header>

        <section class="summary-cards">
            <div class="card summary-card status-high">
                <span class="card-title">In Stock</span>
                <h2 id="total-high">13</h2>
            </div>
            <div class="card summary-card status-low">
                <span class="card-title">Low Stock</span>
                <h2 id="total-low">4</h2>
            </div>
            <div class="card summary-card status-empty">
                <span class="card-title">Out of Stock</span>
                <h2 id="total-empty">4</h2>
            </div>
        </section>

        <section class="legend-bar card">
            <span class="legend-title">Status Legend:</span>
            <div class="legend-item"><span class="dot bg-high"></span> High</div>
            <div class="legend-item"><span class="dot bg-low"></span> Low</div>
            <div class="legend-item"><span class="dot bg-empty"></span> Empty</div>
        </section>

        <section class="controls card">
            <div class="control-group">
                <label>Search Components</label>
                <input type="text" id="searchInput" placeholder="Search by name or value...">
            </div>
            <div class="control-group">
                <label>Category</label>
                <select id="categorySelect">
                    <option>All Categories</option>
                    <option>Resistor</option> <option>Capacitor</option>
                </select>
            </div>
            <div class="control-group">
                <label>Status</label>
                <div class="button-group" id="statusButtons">
                    <button class="btn active">All</button>
                    <button class="btn">High</button>
                    <button class="btn">Low</button>
                    <button class="btn">Empty</button>
                </div>
            </div>
        </section>

        <section class="component-section">
            <h3>Inventory</h3>
            <div class="component-grid">
                
            </div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
